apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: career-concierge
  namespace: career-concierge
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: career-concierge
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
